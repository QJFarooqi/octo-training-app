<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager + Study Coach</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js"></script>
  </head>
  <body>
    <main class="container">
      <h1>Task Manager</h1>

      <form id="add-task-form" data-testid="task-manager-form" novalidate>
        <label for="task-input">New task</label>
        <div class="input-row">
          <input
            type="text"
            id="task-input"
            data-testid="task-manager-form-input"
            placeholder="What needs doing?"
            autocomplete="off"
            maxlength="200"
          />
          <button type="submit" data-testid="task-manager-form-submit">
            Add
          </button>
        </div>
        <p id="form-error" class="error" role="alert" aria-live="polite"></p>
      </form>

      <nav class="filters" aria-label="Filter tasks">
        <button
          class="filter-btn active"
          data-filter="all"
          data-testid="filter-all"
        >
          All
        </button>
        <button
          class="filter-btn"
          data-filter="active"
          data-testid="filter-active"
        >
          Active
        </button>
        <button
          class="filter-btn"
          data-filter="completed"
          data-testid="filter-completed"
        >
          Completed
        </button>
      </nav>

      <p id="stats" class="stats" aria-live="polite"></p>

      <ul
        id="task-list"
        data-testid="task-list"
        aria-label="Task list"
        aria-live="polite"
      ></ul>

      <div id="empty-state" class="empty-state" hidden>
        <p>No tasks here. Add one above!</p>
      </div>

      <button
        id="clear-completed"
        data-testid="clear-completed"
        class="secondary"
      >
        Clear completed
      </button>

      <!-- Add this section inside <main class="container"> after the task manager -->

      <section class="study-coach" aria-labelledby="coach-heading">
        <h2 id="coach-heading">AI Study Coach</h2>
        <p class="section-intro">
          Generate a personalised study plan with your AI assistant using the
          prompt below, then paste the raw JSON output here to render your plan.
        </p>

        <details class="prompt-reference">
          <summary>Show prompt template</summary>
          <pre id="prompt-template" data-testid="prompt-template">
Loading prompt template...
    </pre
          >
          <button type="button" id="copy-prompt" data-testid="copy-prompt-btn">
            Copy prompt
          </button>
        </details>

        <form id="coach-form" data-testid="coach-form" novalidate>
          <label for="plan-input">Paste your AI-generated JSON plan here</label>
          <textarea
            id="plan-input"
            data-testid="coach-form-textarea"
            rows="10"
            placeholder='{ "planTitle": "...", "topics": [...] }'
            spellcheck="false"
            aria-describedby="coach-error"
          ></textarea>

          <div class="form-actions">
            <button
              type="submit"
              id="parse-btn"
              data-testid="coach-form-submit"
            >
              Parse Plan
            </button>
            <button
              type="button"
              id="clear-plan"
              class="secondary"
              data-testid="coach-clear-btn"
            >
              Clear saved plan
            </button>
          </div>

          <p
            id="coach-error"
            class="error"
            role="alert"
            aria-live="assertive"
          ></p>
        </form>

        <div
          id="coach-output"
          data-testid="coach-output"
          aria-live="polite"
          aria-label="Study plan output"
        ></div>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
